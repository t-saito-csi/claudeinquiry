name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time; queue rather than cancel
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: t-saito-csi
  IMAGE_REPO: claudeinquiry

jobs:
  # -----------------------------------------------
  # Build & push Docker images to GHCR
  # -----------------------------------------------
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    strategy:
      matrix:
        include:
          - service: api
            context: ./backend
            dockerfile: ./backend/Dockerfile
            target: runtime
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            target: runtime

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache: restore from GHCR cache, save back after build
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/${{ matrix.service }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/${{ matrix.service }}:cache,mode=max

  # -----------------------------------------------
  # SSH into OCI instance and deploy
  # -----------------------------------------------
  deploy:
    name: Deploy to OCI Compute Instance
    runs-on: ubuntu-latest
    needs: build-and-push
    # environment:
    #   name: production
    # TODO: OCI本番環境の準備ができたらコメントアウトを解除する

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.OCI_HOST }} >> ~/.ssh/known_hosts

      - name: Execute deploy script on OCI instance
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=yes \
            "$OCI_USER@$OCI_HOST" \
            "DEPLOY_SHA=$DEPLOY_SHA bash -s" < scripts/deploy.sh

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
